<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Kovac Family</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f5f6fa;
    color: #2d3436;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .container {
    text-align: center;
    padding: 40px;
    max-width: 600px;
  }
  h1 {
    font-size: 2.2rem;
    font-weight: 700;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #2c3e50, #3498db);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle {
    color: #636e72;
    font-size: 1rem;
    margin-bottom: 40px;
  }
  .apps {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  a.app-card {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 24px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    text-decoration: none;
    color: #2d3436;
    transition: all 0.2s;
  }
  a.app-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.12);
  }
  .app-icon {
    width: 48px;
    height: 48px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    flex-shrink: 0;
  }
  .app-info { text-align: left; }
  .app-name { font-weight: 600; font-size: 1.05rem; }
  .app-desc { font-size: 0.8rem; color: #636e72; margin-top: 2px; }
</style>
</head>
<body>
<div class="container">
  <h1>The Kovac Family</h1>
  <p class="subtitle">Family Apps & Tools</p>
  <div class="apps">
    <a class="app-card" href="planner.html">
      <div class="app-icon" style="background: linear-gradient(135deg, #2c3e50, #3498db); color: white;">&#9992;</div>
      <div class="app-info">
        <div class="app-name">Travel & Vacation Planner</div>
        <div class="app-desc">Color-coded calendar for trips, meetings, and PTO</div>
      </div>
    </a>
  </div>
</div>
</body>
</html>
