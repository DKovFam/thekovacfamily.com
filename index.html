<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Kovac Family</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f5f6fa;
    color: #2d3436;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .container {
    text-align: center;
    padding: 40px;
    max-width: 600px;
  }
  h1 {
    font-size: 2.2rem;
    font-weight: 700;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #2c3e50, #3498db);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle {
    color: #636e72;
    font-size: 1rem;
    margin-bottom: 40px;
  }
  .apps {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  a.app-card {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 24px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    text-decoration: none;
    color: #2d3436;
    transition: all 0.2s;
  }
  a.app-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.12);
  }
  .app-icon {
    width: 48px;
    height: 48px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    flex-shrink: 0;
  }
  .app-info { text-align: left; }
  .app-name { font-weight: 600; font-size: 1.05rem; }
  .app-desc { font-size: 0.8rem; color: #636e72; margin-top: 2px; }

  /* Password screen */
  .lock-screen {
    text-align: center;
    padding: 40px;
    max-width: 400px;
  }
  .lock-icon {
    font-size: 3rem;
    margin-bottom: 16px;
  }
  .lock-screen h1 { margin-bottom: 6px; }
  .lock-subtitle {
    color: #636e72;
    font-size: 0.9rem;
    margin-bottom: 28px;
  }
  .password-form {
    display: flex;
    gap: 8px;
  }
  .password-form input {
    flex: 1;
    padding: 12px 16px;
    border: 2px solid #dfe6e9;
    border-radius: 10px;
    font-size: 1rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  .password-form input:focus { border-color: #3498db; }
  .password-form input.error { border-color: #e53935; animation: shake 0.4s ease; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
  .password-form button {
    padding: 12px 24px;
    background: linear-gradient(135deg, #2c3e50, #3498db);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s;
  }
  .password-form button:hover { transform: scale(1.03); }
  .error-msg {
    color: #e53935;
    font-size: 0.8rem;
    margin-top: 10px;
    height: 1.2em;
  }
</style>
</head>
<body>

<!-- Password screen -->
<div class="lock-screen" id="lockScreen">
  <div class="lock-icon">&#128274;</div>
  <h1>The Kovac Family</h1>
  <p class="lock-subtitle">Enter the family password to continue</p>
  <div class="password-form">
    <input type="password" id="pwInput" placeholder="Password" autocomplete="off" onkeydown="if(event.key==='Enter')checkPassword()">
    <button onclick="checkPassword()">Enter</button>
  </div>
  <div class="error-msg" id="errorMsg"></div>
</div>

<!-- Main content (hidden until authenticated) -->
<div class="container" id="mainContent" style="display:none">
  <h1>The Kovac Family</h1>
  <p class="subtitle">Family Apps & Tools</p>
  <div class="apps">
    <a class="app-card" href="planner.html">
      <div class="app-icon" style="background: linear-gradient(135deg, #2c3e50, #3498db); color: white;">&#9992;</div>
      <div class="app-info">
        <div class="app-name">Travel & Vacation Planner</div>
        <div class="app-desc">Color-coded calendar for trips, meetings, and PTO</div>
      </div>
    </a>
  </div>
</div>

<script>
// Simple hash of password for comparison (not stored in plain text in source)
const HASH = '439b9f6edd26f5ecfa77f188a51b9cf1';

function simpleHash(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    const ch = str.charCodeAt(i);
    hash = ((hash << 5) - hash) + ch;
    hash |= 0;
  }
  // Convert to md5-like hex string using multiple passes for better distribution
  let h1 = 0x811c9dc5, h2 = 0x1000193, h3 = 0xdeadbeef, h4 = 0xcafebabe;
  for (let i = 0; i < str.length; i++) {
    const ch = str.charCodeAt(i);
    h1 = Math.imul(h1 ^ ch, 0x01000193);
    h2 = Math.imul(h2 ^ ch, 0x27d4eb2d);
    h3 = Math.imul(h3 ^ ch, 0x1b873593);
    h4 = Math.imul(h4 ^ ch, 0xcc9e2d51);
  }
  return (h1 >>> 0).toString(16).padStart(8, '0') +
         (h2 >>> 0).toString(16).padStart(8, '0') +
         (h3 >>> 0).toString(16).padStart(8, '0') +
         (h4 >>> 0).toString(16).padStart(8, '0');
}

function checkPassword() {
  const input = document.getElementById('pwInput');
  const err = document.getElementById('errorMsg');
  if (simpleHash(input.value) === HASH) {
    sessionStorage.setItem('kvf_auth', 'true');
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
  } else {
    input.classList.add('error');
    err.textContent = 'Incorrect password. Try again.';
    setTimeout(() => input.classList.remove('error'), 400);
  }
}

// Check if already authenticated this session
if (sessionStorage.getItem('kvf_auth') === 'true') {
  document.getElementById('lockScreen').style.display = 'none';
  document.getElementById('mainContent').style.display = 'block';
} else {
  document.getElementById('pwInput').focus();
}
</script>
</body>
</html>
